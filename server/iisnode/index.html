<html>
<head>
    <title>iisnode logs</title>
    <style type="text/css">
        body
        {
            font-family: "Trebuchet MS" , Arial, Helvetica, sans-serif;
        }
        table
        {
            border-collapse: collapse;
        }
        td, th
        {
            border: 1px solid lightgray;
            padding: 3px 7px 2px 7px;
        }
        th
        {
            text-align: left;
            padding-top: 5px;
            padding-bottom: 4px;
            background-color: Gray;
            color: #ffffff;
        }
        td.stderr
        {
            color: Red;
        }
    </style>
</head>
<body>
    <table id="logFilesTable">
        <tr>
            <th>
                Computer name
            </th>
            <th>
                PID
            </th>
            <th>
                Type
            </th>
            <th>
                Created
            </th>
            <th>
                Link
            </th>
        </tr>
    </table>
    <p id="lastUpdated"></p>
    <script type="text/javascript">

        // this is replaced with actual data at runtime by code in interceptor.js
        var logFiles = [{"file":"IBS-GENAIMASTER-72732-stderr-1775542358109.txt","computername":"IBS-GENAIMASTER","pid":72732,"type":"stderr","created":1775542358109},{"file":"IBS-GENAIMASTER-72732-stdout-1775542358109.txt","computername":"IBS-GENAIMASTER","pid":72732,"type":"stdout","created":1775542358109},{"file":"IBS-GENAIMASTER-75700-stderr-1775543338615.txt","computername":"IBS-GENAIMASTER","pid":75700,"type":"stderr","created":1775543338615},{"file":"IBS-GENAIMASTER-75700-stdout-1775543338615.txt","computername":"IBS-GENAIMASTER","pid":75700,"type":"stdout","created":1775543338615},{"file":"IBS-GENAIMASTER-76892-stderr-1775538347623.txt","computername":"IBS-GENAIMASTER","pid":76892,"type":"stderr","created":1775538347623},{"file":"IBS-GENAIMASTER-76892-stdout-1775538347623.txt","computername":"IBS-GENAIMASTER","pid":76892,"type":"stdout","created":1775538347623},{"file":"IBS-GENAIMASTER-83444-stderr-1775550513599.txt","computername":"IBS-GENAIMASTER","pid":83444,"type":"stderr","created":1775550513599},{"file":"IBS-GENAIMASTER-83444-stdout-1775550513598.txt","computername":"IBS-GENAIMASTER","pid":83444,"type":"stdout","created":1775550513598},{"file":"IBS-GENAIMASTER-83724-stderr-1775540332638.txt","computername":"IBS-GENAIMASTER","pid":83724,"type":"stderr","created":1775540332638},{"file":"IBS-GENAIMASTER-83724-stdout-1775540332637.txt","computername":"IBS-GENAIMASTER","pid":83724,"type":"stdout","created":1775540332637},{"file":"IBS-GENAIMASTER-88204-stderr-1775544618494.txt","computername":"IBS-GENAIMASTER","pid":88204,"type":"stderr","created":1775544618494},{"file":"IBS-GENAIMASTER-88204-stdout-1775544618494.txt","computername":"IBS-GENAIMASTER","pid":88204,"type":"stdout","created":1775544618494},{"file":"IBS-GENAIMASTER-96400-stderr-1775550682570.txt","computername":"IBS-GENAIMASTER","pid":96400,"type":"stderr","created":1775550682570},{"file":"IBS-GENAIMASTER-96400-stdout-1775550682569.txt","computername":"IBS-GENAIMASTER","pid":96400,"type":"stdout","created":1775550682569}];
        var lastUpdated = 1775550683575;
        var date = new Date();

        date.setTime(lastUpdated);
        document.getElementById('lastUpdated').innerHTML = 'Index was last updated ' + date;

        logFiles.sort(function (a, b) {
            return b.created - a.created;
        });

        var logFilesTable = document.getElementById("logFilesTable");
        for (var i = 0; i < logFiles.length; i++) {
            var logFile = logFiles[i];
            date.setTime(logFile.created);
            var row = logFilesTable.insertRow(-1);
            var computerNameCell = row.insertCell(0);
            var pidCell = row.insertCell(1);
            var typeCell = row.insertCell(2);
            var dateCell = row.insertCell(3);
            var logCell = row.insertCell(4);
            computerNameCell.innerHTML = logFile.computername;
            pidCell.innerHTML = logFile.pid.toString();
            typeCell.innerHTML = logFile.type;
            typeCell.setAttribute('class', logFile.type);

        };

    </script>
</body>
</html>
